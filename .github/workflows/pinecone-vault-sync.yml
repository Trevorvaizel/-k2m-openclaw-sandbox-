name: Pinecone Vault Sync

on:
  push:
    branches:
      - main
    paths:
      - "docs/**/*.md"
      - "atlas/**/*.md"
      - "memory/**/*.md"
      - "scripts/index-vault.py"
      - ".github/workflows/pinecone-vault-sync.yml"
  workflow_dispatch:

concurrency:
  group: pinecone-vault-sync-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore Pinecone sync state
        id: restore-sync-state
        uses: actions/cache/restore@v4
        with:
          path: tmp/pinecone-index-state.json
          key: pinecone-sync-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            pinecone-sync-state-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install Pinecone SDK
        run: |
          python -m pip install --upgrade pip
          python -m pip install pinecone

      - name: Sync vault to Pinecone
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: python scripts/index-vault.py

      - name: Save Pinecone sync state
        if: always() && hashFiles('tmp/pinecone-index-state.json') != ''
        uses: actions/cache/save@v4
        with:
          path: tmp/pinecone-index-state.json
          key: pinecone-sync-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
