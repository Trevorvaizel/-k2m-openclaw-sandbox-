  - id: 2026-03-30-universal-mcp-layer
    date: 2026-03-30
    type: runtime-architecture
    status: completed
    summary: >
      Implemented a repo-owned universal MCP layer for K2M belief operations so Codex and
      Claude Code can use the same local orchestration server for ClickUp, Notion, Apify,
      and Firecrawl. Added K2M-shaped Notion tools, ClickUp runtime helpers, audience
      collection recipes, shared CLI jobs, and explicit runtime-state documentation.
    decisions:
      - id: D-011
        title: Treat the local K2M MCP server as the orchestration layer
        rationale: >
          The prior local server was mainly a set of raw wrappers. The system now treats the
          repo-local MCP server as the operational layer that translates K2M workflow intent
          into actions across ClickUp, Notion, Apify, and Firecrawl.
        artifacts:
          - tools/k2m_mcp/server.py
          - tools/k2m_mcp/common.py
          - tools/k2m_mcp/clickup_layer.py
          - tools/k2m_mcp/notion_layer.py
          - tools/k2m_mcp/intel_layer.py
      - id: D-012
        title: Use project-scoped MCP config as the portability layer
        rationale: >
          The repo should describe the MCP stack directly so Codex and Claude Code can load
          the same servers without recreating setup from memory or app-specific state.
        artifacts:
          - .mcp.json
          - tools/k2m_mcp/README.md
      - id: D-013
        title: Add explicit runtime-state documentation and update protocol
        rationale: >
          The system needed one document describing how it runs now, plus a rule that this
          visibility layer must be refreshed after implementation changes.
        artifacts:
          - docs/belief-operations/k2m-runtime-state.md
          - docs/belief-operations/README.md
          - docs/belief-operations/agent-handoff-log.md
    local_changes:
