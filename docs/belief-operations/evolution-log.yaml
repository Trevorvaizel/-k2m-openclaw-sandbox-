  - id: 2026-03-30-live-system-hardening-and-agent-handoff
    date: 2026-03-30
    type: operating-state
    status: in-progress
    summary: >
      Verified live ClickUp and Notion access through MCP, confirmed the boundary between
      MCP-managed operations and UI-managed configuration, and added an agent-visible handoff
      log so future sessions can see the current execution state without inferring it from
      scattered docs.
    decisions:
      - id: D-007
        title: Add a dedicated agent handoff log for current execution state
        rationale: >
          The evolution log is useful for milestone history, but it is too coarse for live
          coordination between agents. A separate handoff log gives current state, touched
          systems, and next actions without turning the historical log into an operating
          scratchpad.
        artifacts:
          - docs/belief-operations/agent-handoff-log.md
          - docs/belief-operations/README.md
      - id: D-008
        title: Treat evolution-log.yaml as milestone history, not day-to-day execution tracking
        rationale: >
          The system needs both a historical ledger and a current-state ledger. Mixing them
          would make it harder for agents to know what is truly current versus what is merely
          historically recorded.
        artifacts:
          - docs/belief-operations/evolution-log.yaml
          - docs/belief-operations/agent-handoff-log.md
    live_system_verification:
      clickup_mcp:
        status: verified
        capabilities:
          - read_task
          - search
          - update_task
          - read_list
          - update_list
        known_gap: >
          Custom-field creation, view setup, dashboard configuration, and deeper workspace
          shaping still require UI automation in the current tool surface.
      notion_mcp:
        status: verified
        capabilities:
          - fetch
          - search
          - query_schema_and_views
        known_gap: >
          Depending on the loaded namespace, direct record creation and editing may still
          require UI work for some sessions.
