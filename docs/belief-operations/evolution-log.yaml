      condensed the broad belief-operations architecture into one executable Sprint 01 so
      agents can review and implement against the same operating target.
    decisions:
      - id: D-009
        title: Use a dedicated adversarial review prompt to test maturity claims
        rationale: >
          Friendly reviews tend to reward architecture quality even when runtime execution is
          still thin. A dedicated adversarial prompt forces agents to separate documented
          structure from live operational capability.
        artifacts:
