        title: Treat explicit-URL Facebook actor runs as the verification path for student Facebook evidence
        rationale: >
          Firecrawl can discover candidate Facebook URLs but cannot scrape Facebook pages
          directly. The stronger verification path is newest-first discovery followed by the
          Facebook Apify actor on explicit public URLs only.
