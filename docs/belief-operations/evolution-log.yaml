  - id: 2026-03-30-doctrine-scoring-and-operating-contract
    date: 2026-03-30
    type: runtime-architecture
    status: completed
    summary: >
      Added doctrine-derived signal scoring, an explicit collector registry, optional Tavily
      integration, and a machine-readable operating contract so agents can reason about what
      each tool layer should look for before writing to Notion or ClickUp. Propagated the
      same contract into newly generated ClickUp task descriptions and newly generated Notion
      record bodies.
    decisions:
      - id: D-014
        title: Encode belief-audit and topology-audit doctrine as machine-readable rules
        rationale: >
          The previous intelligence layer knew where to search but not what doctrine-defined
          outputs it needed to find. The system now scores sources against explicit audit
          targets and signal classes before promoting them to reviewed evidence.
        artifacts:
          - tools/k2m_mcp/signal_rules.py
          - tools/k2m_mcp/intel_layer.py
      - id: D-015
        title: Use a collector registry to add new scrapers through one extension path
        rationale: >
          New providers should be added through a consistent contract: env key, request
          helper, registry entry, normalization, then audience-recipe inclusion. This avoids
          prompt-only or one-off scraper logic.
        artifacts:
          - tools/k2m_mcp/common.py
          - tools/k2m_mcp/README.md
      - id: D-016
        title: Add a machine-readable operating contract for tool-layer intent
        rationale: >
          Agents and internal operators need a runtime answer to what each tool is for, what
          it should look for, and what checklist gates writes. This contract now exists as a
          queryable MCP/CLI surface.
        artifacts:
          - tools/k2m_mcp/operating_contract.py
          - tools/k2m_mcp/server.py
          - docs/belief-operations/k2m-runtime-state.md
          - docs/belief-operations/k2m-tool-operating-contract.md
    local_changes:
