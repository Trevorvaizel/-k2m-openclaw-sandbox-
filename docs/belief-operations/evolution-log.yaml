  - id: 2026-03-29-bootstrap-foundation
    date: 2026-03-29
    type: bootstrap
    status: completed
    summary: >
      Established the first complete belief-operations documentation set, clarified the
      product stack, and bootstrapped the initial Notion workspace for ongoing market,
      belief, topology, and workflow operations.
    decisions:
      - id: D-001
        title: Separate product truth from marketing operations
        rationale: >
          Product identity, category belief, product belief, and market operations were being
          collapsed into one layer. The system now treats product truth as upstream of the
          marketing, sales, retention, and referral operating model.
        artifacts:
          - docs/k2m-layer4-product-brief.md
          - docs/belief-operations/k2m-belief-operations-os.md
      - id: D-002
        title: Make network topology upstream of message optimization
        rationale: >
          The canonical texts argue that it is better to map the network before optimizing
          messages. The operating system now separates belief architecture from topology and
          treats topology mapping as a required input to penetration design.
        artifacts:
          - docs/belief-operations/k2m-belief-operations-os.md
          - docs/belief-operations/k2m-live-market-intelligence-os.md
          - docs/belief-operations/templates/k2m-network-topology-audit-template.md
      - id: D-003
        title: Keep canonical doctrine separate from executable skills
        rationale: >
          The canonical texts remain source doctrine. Skills are derived operating
          procedures with constrained inputs, outputs, tools, and artifacts.
        artifacts:
          - docs/belief-operations/k2m-skill-architecture.md
      - id: D-004
        title: Use Notion as the canonical map layer and ClickUp as execution
        rationale: >
          Maps, registries, evidence, and reviews belong in Notion. Work execution,
          ownership, and flow transitions belong in ClickUp.
        artifacts:
          - docs/belief-operations/k2m-notion-information-architecture.md
          - docs/belief-operations/k2m-clickup-workflow-architecture.md
    local_changes:
