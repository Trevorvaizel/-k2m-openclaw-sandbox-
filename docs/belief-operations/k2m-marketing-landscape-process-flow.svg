    <tspan x="215" dy="18">category belief, wedge, routing</tspan>
    <tspan x="215" dy="18">threshold-zero entry</tspan>
  </text>

  <rect class="territory" x="390" y="450" width="290" height="92" />
  <text class="card-title" x="535" y="478">02 Sales</text>
  <text class="card-body" x="535" y="501">
    <tspan x="535" dy="0">trust verification</tspan>
    <tspan x="535" dy="18">trust gradient + friction walk</tspan>
    <tspan x="535" dy="18">proof stack + expectation contract</tspan>
  </text>

  <rect class="territory" x="710" y="450" width="290" height="92" />
  <text class="card-title" x="855" y="478">03 Retention</text>
  <text class="card-body" x="855" y="501">
