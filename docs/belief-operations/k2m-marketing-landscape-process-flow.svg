    <tspan x="1630" dy="18">Workflow Runs, Map Update Memos</tspan>
    <tspan x="1630" dy="18">Border Issue Log, Evidence Sources</tspan>
  </text>

  <rect class="clickup" x="1450" y="700" width="360" height="215" />
  <text class="card-title" x="1630" y="730">ClickUp</text>
  <text class="card-body" x="1630" y="753">
    <tspan x="1630" dy="0">execution surface for live work</tspan>
    <tspan x="1630" dy="18">00 Upstream Truth, 01 Penetration</tspan>
    <tspan x="1630" dy="18">02 Sales, 03 Retention, 04 Referral</tspan>
    <tspan x="1630" dy="18">05 Border Repairs, 06 Live Intelligence</tspan>
    <tspan x="1630" dy="18">07 Governance</tspan>
  </text>

  <rect class="legend" x="1450" y="975" width="360" height="145" />
  <text class="card-title" x="1630" y="1005">Legend</text>
  <line x1="1490" y1="1035" x2="1580" y2="1035" class="flow" />
  <text class="note" x="1600" y="1040">solid = operating flow</text>
  <line x1="1490" y1="1070" x2="1580" y2="1070" class="feedback" />
  <text class="note" x="1600" y="1075">dashed = diagnostics / map feedback</text>
  <line x1="1490" y1="1105" x2="1580" y2="1105" class="loop" />
  <text class="note" x="1600" y="1110">green dashed = expansion loop return</text>

  <rect class="frame" x="40" y="380" width="1320" height="210" />
  <text class="frame-title" x="60" y="412">Core Territory Flow</text>

  <rect class="territory" x="70" y="450" width="290" height="92" />
  <text class="card-title" x="215" y="478">01 Penetration</text>
  <text class="card-body" x="215" y="501">
