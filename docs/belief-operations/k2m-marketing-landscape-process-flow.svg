<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1240" viewBox="0 0 1900 1240" role="img" aria-labelledby="title desc">
  <title id="title">K2M Marketing Landscape Process Flow</title>
  <desc id="desc">A process flow diagram showing upstream truth, live market intelligence, the four territories, border diagnostics, touchpoint surfaces, the expansion loop, and the Notion and ClickUp operating layers for K2M belief operations.</desc>
  <defs>
    <style>
      .bg { fill: #f7f2e9; }
      .frame { fill: #fffaf3; stroke: #d4c8b5; stroke-width: 2; rx: 26; ry: 26; }
      .frame-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #2e2a24; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #1f1a14; }
      .subtitle { font: 500 17px 'Segoe UI', Arial, sans-serif; fill: #65594c; }
      .card-title { font: 700 19px 'Segoe UI', Arial, sans-serif; fill: #1f1a14; text-anchor: middle; }
      .card-body { font: 15px 'Segoe UI', Arial, sans-serif; fill: #3f372f; text-anchor: middle; }
      .small { font-size: 14px; }
      .tiny { font-size: 13px; }
      .note { font: 14px 'Segoe UI', Arial, sans-serif; fill: #5a5044; }
      .upstream { fill: #f4dfb2; stroke: #b9872f; stroke-width: 2; rx: 20; ry: 20; }
      .intel { fill: #d9ece8; stroke: #4f857d; stroke-width: 2; rx: 20; ry: 20; }
      .territory { fill: #ecd8ce; stroke: #a16d59; stroke-width: 2; rx: 20; ry: 20; }
      .border { fill: #f5d9d3; stroke: #b76059; stroke-width: 2; rx: 18; ry: 18; }
      .touch { fill: #f6efca; stroke: #c4a353; stroke-width: 2; rx: 18; ry: 18; }
      .expand { fill: #dbead6; stroke: #5b865d; stroke-width: 2; rx: 18; ry: 18; }
      .govern { fill: #f7e4ba; stroke: #a47520; stroke-width: 2; rx: 20; ry: 20; }
      .notion { fill: #e6ded3; stroke: #80664a; stroke-width: 2; rx: 20; ry: 20; }
      .clickup { fill: #dceaf6; stroke: #4a7597; stroke-width: 2; rx: 20; ry: 20; }
      .legend { fill: #f8f4ec; stroke: #d4c8b5; stroke-width: 1.5; rx: 16; ry: 16; }
      .flow { fill: none; stroke: #5d5a54; stroke-width: 3.2; marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #7a756d; stroke-width: 2.4; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #5b865d; stroke-width: 2.8; stroke-dasharray: 10 8; marker-end: url(#arrow-green); }
      .mapflow { fill: none; stroke: #6b6257; stroke-width: 2.6; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5d5a54" />
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#5b865d" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1240" />

  <text class="title" x="40" y="48">K2M Marketing Landscape Process Flow</text>
  <text class="subtitle" x="40" y="76">Belief architecture + topology + territory execution + expansion + operating layers</text>

  <rect class="frame" x="40" y="100" width="430" height="250" />
  <text class="frame-title" x="60" y="132">Upstream Truth</text>

  <rect class="upstream" x="70" y="155" width="370" height="78" />
  <text class="card-title" x="255" y="182">Layer 0: Product Truth</text>
  <text class="card-body" x="255" y="205">
    <tspan x="255" dy="0">philosophy -&gt; kernel -&gt; identity</tspan>
    <tspan x="255" dy="18">bridge identity -&gt; category/product belief</tspan>
    <tspan x="255" dy="18">payoff -&gt; proof object</tspan>
  </text>

  <rect class="upstream" x="70" y="248" width="370" height="82" />
  <text class="card-title" x="255" y="276">Layer 1: Territory Truth</text>
  <text class="card-body" x="255" y="299">
    <tspan x="255" dy="0">belief architecture + network topology</tspan>
    <tspan x="255" dy="18">self-verdicts, failed promises, clusters, bridges</tspan>
    <tspan x="255" dy="18">mavens, connectors, threshold bands</tspan>
  </text>

  <path class="flow" d="M 255 233 L 255 248" />

  <rect class="frame" x="500" y="100" width="860" height="250" />
