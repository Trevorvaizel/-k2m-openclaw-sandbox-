  <rect class="intel" x="530" y="165" width="235" height="110" />
  <text class="card-title" x="647" y="193">Signal Sources</text>
  <text class="card-body" x="647" y="216">
    <tspan x="647" dy="0">search discovery</tspan>
    <tspan x="647" dy="18">site graph + public extraction</tspan>
    <tspan x="647" dy="18">public influence + first-party</tspan>
    <tspan x="647" dy="18">competitor signals</tspan>
  </text>

  <rect class="intel" x="812" y="165" width="235" height="110" />
  <text class="card-title" x="929" y="193">Intelligence Loop</text>
  <text class="card-body" x="929" y="216">
    <tspan x="929" dy="0">discover -&gt; map -&gt; capture</tspan>
    <tspan x="929" dy="18">normalize -&gt; infer</tspan>
    <tspan x="929" dy="18">review -&gt; publish</tspan>
  </text>

  <rect class="intel" x="1094" y="165" width="235" height="110" />
  <text class="card-title" x="1211" y="193">Reviewed Outputs</text>
  <text class="card-body" x="1211" y="216">
    <tspan x="1211" dy="0">map update memos</tspan>
    <tspan x="1211" dy="18">language banks + timing alerts</tspan>
    <tspan x="1211" dy="18">topology alerts + evidence summaries</tspan>
  </text>

